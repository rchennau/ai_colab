# ai-colab tmux Configuration
# Self-contained tmux config - isolated from user's environment.
# This ensures consistent behavior across all environments.

# ============================================================
# Global Settings
# ============================================================

# Use clean shell environment - don't load user's .bashrc/.zshrc
# This ensures ai-colab is self-contained and portable
set -g default-command "bash --norc --noprofile"
set -g default-shell "/bin/bash"

# Enable mouse support
set -g mouse on

# Pane border styling
set -g pane-border-status top
set -g pane-border-format "#P: #{pane_title}"
set -g allow-rename off

# Status bar
set -g status on
set -g status-position bottom
set -g status-interval 20
set -g status-justify left

# Colors
set -g status-style "bg=colour235,fg=colour244"
set -g status-left-length 40
set -g status-right-length 60

# Status bar content
set -g status-left "#[fg=colour244,bg=colour235] ai-colab "
set -g status-right "#[fg=colour244,bg=colour235] %H:%M "

# Window status
setw -g window-status-format "#[fg=colour244] #I:#W "
setw -g window-status-current-format "#[fg=colour46,bold] #I:#W "
setw -g window-status-separator ""

# ============================================================
# Key Bindings
# ============================================================

# Prefix (keep default C-b)
#unbind C-b
#set -g prefix C-b
#bind C-b send-prefix C-b

# Zoom/unzoom current pane
bind f resize-pane -Z

# Quick window navigation
bind h select-window -t :0    # Dashboard (window 0)
bind l select-window -t :1    # Fleet (window 1)

# Pane navigation (override defaults for consistency)
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.ai-colab/tmux.conf \; display "Reloaded ai-colab tmux config"

# ============================================================
# Session Settings
# ============================================================

# History limit
set -g history-limit 5000

# Focus events
set -g focus-events on

# Base index (start windows at 0)
set -g base-index 0
setw -g pane-base-index 0
