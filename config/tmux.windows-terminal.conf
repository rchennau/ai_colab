# WSL/Windows Terminal-Optimized tmux Configuration for ai-colab
# Designed for WSL2 Ubuntu with Windows Terminal

# ============================================
# WSL/Windows Terminal Specific Optimizations
# ============================================

# Enable true color support (Windows Terminal supports this well)
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Unicode support in Windows Terminal
set -g utf8 on
set-window-option -g utf8 on

# Mouse support (works in Windows Terminal)
set -g mouse on

# ============================================
# Windows Interop Settings
# ============================================

# Enable clipboard integration with Windows
# This allows tmux to use Windows clipboard
set -g set-clipboard on

# Fix for Windows Terminal rendering
set -g pane-border-lines single

# ============================================
# Pane and Border Styling
# ============================================

# Windows Terminal-friendly colors
set -g pane-border-status top
set -g pane-border-format "#[fg=colour232,bg=colour236] #T "
set -g pane-border-style "fg=colour239,bg=default"
set -g pane-active-border-style "fg=colour81,bg=default"

# ============================================
# Status Bar
# ============================================

set -g status on
set -g status-justify centre
set -g status-style "bg=colour236,fg=colour252"
set -g status-left ""
set -g status-right "#[fg=colour81,bg=colour239] ai-colab #[fg=colour239]│ #[fg=colour252]WSL #[fg=colour239]│ #[fg=colour=117]%H:%M#[fg=colour239]"
set -g status-right-length 60

# Window list styling
set-window-option -g window-status-format "#[fg=colour244,bg=colour236] #I:#W "
set-window-option -g window-status-current-format "#[fg=colour232,bg=colour81] #I:#W "

# ============================================
# Performance Optimizations for WSL
# ============================================

# WSL2 can have filesystem latency, reduce history slightly
set -g history-limit 50000

# Disable visual bell (can cause issues in WSL)
set -g visual-activity off
set -g monitor-activity off
set -g bell-action none

# ============================================
# Key Bindings
# ============================================

# Use Ctrl-a as prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Quick reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Enhanced pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ============================================
# Copy Mode and Clipboard
# ============================================

setw -g mode-keys vi

# Copy to Windows clipboard via PowerShell
bind y run-shell "tmux save-buffer - | clip.exe"

# Alternative: Use wslclip if installed
# bind y run-shell "tmux save-buffer - | wslclip"

# ============================================
# Windows Terminal Specific Fixes
# ============================================

# Fix for Windows Terminal focus issues
set -g focus-events on

# Prevent title changes from conflicting with Windows Terminal
set-option -g set-titles off
set-window-option -g automatic-rename off

# ============================================
# WSL Path Interop Helpers
# ============================================

# Command to convert WSL path to Windows path
# Usage: Run from tmux: :run-shell "tmux run-shell 'wslpath -w #{pane_current_path}' | clip.exe"

# ============================================
# AI-Colab Dashboard Specific
# ============================================

# Stable pane titles for agent dashboards
set-window-option -g automatic-rename off
set-option -g set-titles off

