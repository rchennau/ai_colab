# Minimal ai-colab Profile
# Core agents only, no extras

version = "1.0.0"
profile = "minimal"

[installation]
status = "complete"
pathway = "cli"

[llm.gemini]
enabled = "true"

[llm.qwen]
enabled = "true"

[llm.deepseek]
enabled = "false"

[llm.claude]
enabled = "false"

[llm.vllm]
enabled = "false"

[compute]
backend = "local"

[module.atari]
enabled = "false"

[module.chat_bridge]
enabled = "false"
