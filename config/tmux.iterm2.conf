# iTerm2-Optimized tmux Configuration for ai-colab
# Designed for multi-agent dashboard with high-density panes

# ============================================
# iTerm2-Specific Optimizations
# ============================================

# Enable true color support (iTerm2 excels here)
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

# iTerm2 has excellent Unicode support
set -g utf8 on
set-window-option -g utf8 on

# Enable mouse support (works great in iTerm2)
set -g mouse on

# ============================================
# Pane and Border Styling
# ============================================

# Use iTerm2-friendly colors (dark theme optimized)
set -g pane-border-status top
set -g pane-border-format "#[fg=colour232,bg=colour236] #T #[fg=colour236,bg=colour239]#{?pane_in_mode, [MODE],} "
set -g pane-border-style "fg=colour239,bg=default"
set -g pane-active-border-style "fg=colour81,bg=default"

# Pane borders with rounded corners aesthetic (iTerm2 renders beautifully)
set -g pane-border-lines single

# ============================================
# Status Bar (Optimized for iTerm2's width)
# ============================================

set -g status on
set -g status-justify centre
set -g status-style "bg=colour236,fg=colour252"
set -g status-left ""
set -g status-right "#[fg=colour232,bg=colour239]#{?client_prefix,⌨️ ,}#[fg=colour81,bg=colour239] ai-colab #[fg=colour239]│ #[fg=colour252]#H #[fg=colour239]│ #[fg=colour=117]%Y-%m-%d#[fg=colour239] │ #[fg=colour=117]%H:%M#[fg=colour239]"
set -g status-right-length 80

# Window list styling
set-window-option -g window-status-format "#[fg=colour244,bg=colour236] #I:#W "
set-window-option -g window-status-current-format "#[fg=colour232,bg=colour81] #I:#W "
set-window-option -g window-status-activity-style "fg=colour117"

# ============================================
# Performance Optimizations for iTerm2
# ============================================

# iTerm2 handles large scrollback well, but limit for performance
set -g history-limit 100000

# Reduce redraw delay (iTerm2 is fast)
set -g visual-activity off
set -g monitor-activity off

# Bell configuration (iTerm2 has good bell support)
set -g bell-action none

# ============================================
# Key Bindings (iTerm2-friendly)
# ============================================

# Use Ctrl-a as prefix (easier for heavy tmux users)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Quick reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# iTerm2-style pane splitting (horizontal/vertical)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Enhanced pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -H resize-pane -L 5
bind -J resize-pane -D 5
bind -K resize-pane -U 5
bind -L resize-pane -R 5

# ============================================
# Copy Mode (iTerm2 has good selection, but tmux is better)
# ============================================

setw -g mode-keys vi

# Quick copy to iTerm2 clipboard
bind y run-shell "tmux save-buffer - | pbcopy"

# ============================================
# Plugins (if tmux plugin manager is available)
# ============================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# iTerm2-specific: Enable focus events
set -g focus-events on

# ============================================
# AI-Colab Dashboard Specific
# ============================================

# Prevent pane title changes from agents
set-window-option -g automatic-rename off

# Keep window titles stable
set-option -g set-titles off

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
