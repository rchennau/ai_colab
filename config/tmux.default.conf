# Default tmux Configuration for ai-colab
# Fallback configuration for terminals without specific optimizations

# ============================================
# Base Configuration
# ============================================

set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Enable mouse support
set -g mouse on

# ============================================
# Pane and Border Styling
# ============================================

set -g pane-border-status top
set -g pane-border-format "#T "
set -g pane-border-style "fg=colour239"
set -g pane-active-border-style "fg=colour81"
set -g pane-border-lines single

# ============================================
# Status Bar
# ============================================

set -g status on
set -g status-justify centre
set -g status-style "bg=colour236,fg=colour252"
set -g status-left ""
set -g status-right "#[fg=colour81]ai-colab #[fg=colour239]│ #[fg=colour252]%H:%M"
set -g status-right-length 50

set-window-option -g window-status-format "#I:#W "
set-window-option -g window-status-current-format "#[fg=colour81]#I:#W "

# ============================================
# Key Bindings
# ============================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "Reloaded!"

bind | split-window -h
bind - split-window -v

# ============================================
# Copy Mode
# ============================================

setw -g mode-keys vi

# ============================================
# Performance
# ============================================

set -g history-limit 50000
set -g visual-activity off
set -g monitor-activity off
set -g bell-action none

# ============================================
# AI-Colab Dashboard
# ============================================

set-window-option -g automatic-rename off
set-option -g set-titles off
