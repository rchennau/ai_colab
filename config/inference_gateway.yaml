# Inference Gateway Configuration
# Routes inference requests through existing CLI tools (FREE access)

gateway:
  enabled: true
  port: 8081
  
  # Batching configuration
  batching:
    enabled: true
    max_batch_size: 10
    max_wait_ms: 100
  
  # Caching configuration
  cache:
    enabled: true
    backend: memory  # memory or redis
    redis_host: localhost
    redis_port: 6379
    ttl_seconds: 300
    max_memory_mb: 512
  
  # Rate limiting per model (CLI rate limits, not API limits)
  rate_limits:
    gemini:
      requests_per_minute: 60
      concurrent_requests: 10
    
    qwen:
      requests_per_minute: 100
      concurrent_requests: 20
    
    claude:
      requests_per_minute: 50
      concurrent_requests: 5
    
    vllm_local:
      requests_per_minute: 1000
      concurrent_requests: 50
  
  # Fallback configuration
  fallback:
    enabled: true
    order:
      - gemini
      - qwen
      - claude
      - vllm_local
    circuit_breaker_threshold: 5
    circuit_breaker_timeout_seconds: 60
  
  # Analytics configuration
  analytics:
    enabled: true
    export_interval_seconds: 60
    retention_days: 30

# Model configurations (CLI-based, FREE access)
models:
  gemini:
    provider: google
    name: Gemini 2.0 Flash
    cli_command: gemini
    cli_args: ["shell"]
    model_id: gemini-2.0-flash
    max_tokens: 32768
    cost_per_1k_input: 0  # FREE via CLI
    cost_per_1k_output: 0
  
  qwen:
    provider: alibaba
    name: Qwen3 Next 80B
    cli_command: qwen
    cli_args: []
    model_id: qwen3-next-80b-a3b-instruct
    max_tokens: 32768
    cost_per_1k_input: 0  # FREE via CLI
    cost_per_1k_output: 0
  
  claude:
    provider: anthropic
    name: Claude 3.5 Sonnet
    cli_command: claude
    cli_args: []
    model_id: claude-3-5-sonnet-20241022
    max_tokens: 32768
    cost_per_1k_input: 0  # FREE via CLI (beta)
    cost_per_1k_output: 0
  
  vllm_local:
    provider: local
    name: DeepSeek Coder (Local)
    cli_command: null  # Uses HTTP endpoint
    endpoint: http://localhost:8000/v1
    model_id: deepseek-coder
    max_tokens: 16384
    cost_per_1k_input: 0  # FREE (local)
    cost_per_1k_output: 0
