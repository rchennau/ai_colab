name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_full_suite:
        description: 'Run full test suite (including slow integration tests)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  PYTHON_VERSION: '3.10'
  CI: true

jobs:
  # ============================================================
  # Stage 1: Lint & Static Analysis
  # ============================================================
  lint-and-analyze:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort mypy

      - name: Run flake8
        run: |
          flake8 webui/ mcp/ rag/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          echo "✓ flake8 critical errors check passed"

      - name: Run black (check only)
        run: |
          black --check webui/ mcp/ rag/ tests/ || echo "⚠ Black formatting needed"
        continue-on-error: true

      - name: Shell script lint
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh launch.sh install.sh || echo "⚠ ShellCheck warnings found"
        continue-on-error: true

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: |
            *.log
          retention-days: 7

  # ============================================================
  # Stage 2: Smoke Test (Conductor Event Processing)
  # ============================================================
  smoke-test:
    name: Smoke Test (Conductor Event Processing)
    runs-on: ubuntu-latest
    needs: lint-and-analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux curl jq sqlite3

      - name: Install hcom
        run: |
          curl -fsSL https://raw.githubusercontent.com/aannoo/hcom/main/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-webui.txt

      - name: Run Smoke Test
        run: |
          chmod +x tests/smoke_test_fast.sh
          bash tests/smoke_test_fast.sh 2>&1 | tee test-results/smoke-test.log
        env:
          CI: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-artifacts
          path: |
            logs/
            test-results/
          retention-days: 7

  # ============================================================
  # Stage 3: Unit Tests
  # ============================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-and-analyze, smoke-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux curl jq sqlite3

      - name: Install hcom
        run: |
          curl -fsSL https://raw.githubusercontent.com/aannoo/hcom/main/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-webui.txt
          pip install -r requirements-mcp.txt
          pip install -r requirements-test.txt 2>/dev/null || echo "No test requirements found"
          pip install pytest pytest-cov pytest-asyncio

      - name: Run Python unit tests
        run: |
          pytest tests/test_*.py -v --cov=webui --cov=mcp --cov=rag --cov-report=xml --cov-report=html --junitxml=test-results/unit-tests.xml || echo "⚠ Some unit tests failed"
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            test-results/
            htmlcov/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: test-results/unit-tests.xml
          fail_ci_if_error: false

  # ============================================================
  # Stage 3: Shell Script Tests
  # ============================================================
  shell-tests:
    name: Shell Script Tests
    runs-on: ubuntu-latest
    needs: [lint-and-analyze, smoke-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux curl jq sqlite3

      - name: Install hcom
        run: |
          curl -fsSL https://raw.githubusercontent.com/aannoo/hcom/main/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-webui.txt

      - name: Run shell test harness
        run: |
          chmod +x scripts/test-all.sh
          bash scripts/test-all.sh --ci --skip-slow --skip-integration 2>&1 | tee test-results/shell-tests.log
        continue-on-error: true

      - name: Upload shell test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shell-test-results
          path: |
            test-results/
          retention-days: 7

  # ============================================================
  # Stage 4: Web UI Tests
  # ============================================================
  webui-tests:
    name: Web UI Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux curl jq

      - name: Install hcom
        run: |
          curl -fsSL https://raw.githubusercontent.com/aannoo/hcom/main/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-webui.txt

      - name: Run Web UI Tests
        run: |
          chmod +x tests/test_webui.sh
          bash tests/test_webui.sh 2>&1 | tee test-results/webui-tests.log
        env:
          CI: true
          PYTHONUNBUFFERED: 1

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webui-test-artifacts
          path: |
            logs/
            test-results/
          retention-days: 7

  # ============================================================
  # Stage 5: Docker Build & Verification
  # ============================================================
  docker-build:
    name: Docker Build & Verify
    runs-on: ubuntu-latest
    needs: [unit-tests, shell-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ai-colab:test . 2>&1 | tee test-results/docker-build.log

      - name: Verify Docker image
        run: |
          # Test that the image runs and health check passes
          docker run -d --name ai-colab-test -p 8080:8080 ai-colab:test
          sleep 10
          curl -f http://localhost:8080/health || echo "⚠ Health check failed"
          docker logs ai-colab-test > test-results/docker-run.log 2>&1
          docker stop ai-colab-test
          docker rm ai-colab-test
        continue-on-error: true

      - name: Upload Docker results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-test-results
          path: |
            test-results/
          retention-days: 7

  # ============================================================
  # Stage 6: Integration Tests (Optional - triggered manually or on main)
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [webui-tests, docker-build]
    if: >
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-integration'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux curl jq sqlite3

      - name: Install hcom
        run: |
          curl -fsSL https://raw.githubusercontent.com/aannoo/hcom/main/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-webui.txt
          pip install -r requirements-mcp.txt
          pip install -r requirements-rag.txt 2>/dev/null || echo "RAG deps optional"
          pip install pytest pytest-cov

      - name: Run integration test harness
        run: |
          chmod +x scripts/test-all.sh
          bash scripts/test-all.sh --ci --skip-slow 2>&1 | tee test-results/integration-tests.log
        continue-on-error: true

      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
          retention-days: 14

  # ============================================================
  # Stage 7: Summary & Report
  # ============================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, shell-tests, webui-tests, docker-build, integration-tests]
    if: always()
    steps:
      - name: Generate test summary
        run: |
          echo "## 🧪 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Analysis | ${{ needs.lint-and-analyze.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shell Tests | ${{ needs.shell-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web UI Tests | ${{ needs.webui-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Determine overall status
          OVERALL="✅ PASS"
          for result in "${{ needs.unit-tests.result }}" "${{ needs.webui-tests.result }}"; do
            if [[ "$result" == "failure" ]]; then
              OVERALL="❌ FAIL"
              break
            fi
          done
          echo "**Overall Status: $OVERALL**" >> $GITHUB_STEP_SUMMARY
