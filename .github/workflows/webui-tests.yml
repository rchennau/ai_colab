name: Web UI Automated Tests

on:
  push:
    paths:
      - 'webui/**'
      - 'requirements-webui.txt'
      - 'tests/test_webui.sh'
  pull_request:
    paths:
      - 'webui/**'
      - 'requirements-webui.txt'
      - 'tests/test_webui.sh'
  workflow_dispatch:  # Allow manual trigger

jobs:
  test-webui:
    name: Web UI Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux curl jq
      
      - name: Install hcom
        run: |
          curl -fsSL https://raw.githubusercontent.com/aannoo/hcom/main/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-webui.txt
      
      - name: Verify installation
        run: |
          python -c "import flask; import flask_cors; import toml; import jsonschema; print('✓ Dependencies OK')"
          tmux -V
          hcom --version || echo "hcom installed"
      
      - name: Run Web UI Tests
        run: |
          chmod +x tests/test_webui.sh
          bash tests/test_webui.sh
        env:
          CI: true
          PYTHONUNBUFFERED: 1
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webui-test-results
          path: |
            /tmp/webui.log
            /tmp/webui.pid
          retention-days: 7
      
      - name: Test summary
        if: always()
        run: |
          echo "## Web UI Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Automated Web UI tests completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Health Endpoint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-flight Checks | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Session Status | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Agents Endpoint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Config Endpoint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Status Endpoint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard Launch | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend HTML | ✅ |" >> $GITHUB_STEP_SUMMARY
