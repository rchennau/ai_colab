[terminal]
active = "default"

[launch]
tag = ""
hints = "You are participating in a multi-agent collaboration. Sync your state via hcom and maintain alignment with conductor/tracks.md. Use 'hcom-kv' to read/write from the shared blackboard. Use Conductor commands (!status, !test, !git-sync) for orchestration."
notes = "Engineering: Use conductor/tracks.md as the source of truth for the current project. All agents MUST monitor the 'plan-sync' thread for state updates."
subagent_timeout = 30
auto_subscribe = "collision"

[launch.gemini]
args = "-m gemini-3.0"

[launch.qwen]
args = "-m qwen3-next-80b-a3b-instruct"

[launch.elc]
args = ""

[relay]
# Self-hosted Mosquitto broker (recommended for production)
# Start with: docker compose --profile mqtt up -d
url = "mqtts://localhost:8883"
enabled = true
tls_enabled = true
ca_cert = "./docker/mosquitto/certs/ca.crt"
client_cert = ""
client_key = ""
username = ""  # Auto-generated on first MQTT broker start
password = ""  # Auto-generated on first MQTT broker start

# Legacy public broker (deprecated - use for migration only)
# url = "mqtts://broker.emqx.io:8883"
# id = "a8cc9080-4338-4678-825f-55bf5a5a861f"
# token = ""
# User Preferences
[preferences]
timeout = 86400
auto_approve = true
name_export = ""

