# Web UI Test Configuration
# Used by automated testing system

[general]
# Test timeout in seconds
timeout = 120

# Enable/disable verbose output
verbose = true

# Port for Web UI server
port = 8080

[paths]
# Web UI source directory
webui_dir = webui/

# Test scripts directory
tests_dir = tests/

# Virtual environment (for local development)
venv_dir = webui-venv/

[watcher]
# Directories to watch for changes
watch_paths = 
    webui/
    requirements-webui.txt
    tests/test_webui.sh

# Files to ignore
ignore_patterns = 
    *.pyc
    __pycache__/
    .git/
    *.swp
    *~

# Debounce delay in seconds (avoid rapid re-testing)
debounce_seconds = 2

[notifications]
# Enable desktop notifications (macOS/Linux)
desktop_notifications = true

# Enable sound notifications
sound_notifications = false

# Log file for test results
log_file = /tmp/webui-test-results.log

[ci]
# CI/CD platform (github, gitlab, jenkins, local)
platform = github

# Fail build on test failure
fail_on_error = true

# Upload test artifacts
upload_artifacts = true

# Artifact retention days
artifact_retention_days = 7

[thresholds]
# Minimum test pass percentage required
min_pass_percentage = 100

# Maximum test duration in seconds
max_test_duration = 60

# Minimum disk space required (MB)
min_disk_space_mb = 100
