# Mosquitto MQTT Broker Configuration
# ai-colab Self-Hosted MQTT Infrastructure (P16.6)

# Listener Configuration
# Non-TLS listener disabled by default for security
# listener 1883
# protocol mqtt

# TLS Listener
listener 8883
protocol mqtt

# TLS Certificate Paths (mounted from docker/mosquitto/certs/)
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key

# Require TLS 1.2+
require_certificate false
tls_version tlsv1.2

# Authentication
allow_anonymous false
password_file /mosquitto/config/passwd

# ACL (Access Control List)
# acl_file /mosquitto/config/acl

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_type error
log_type warning
log_type notice
log_type information
log_dest stderr

# Connection Limits
max_connections -1
max_inflight_messages 20
max_queued_messages 1000

# Keep Alive
keepalive_interval 60

# WebSocket Support (optional, disabled by default)
# listener 8083
# protocol websockets
